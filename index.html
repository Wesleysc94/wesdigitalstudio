  <!-- Schema.org JSON-LD: Service + FAQ for Rich Snippets -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "ProfessionalService",
          "name": "Wes Digital Studio",
          "description": "Estúdio especializado em criação de sites institucionais profissionais e landing pages de alta conversão. Design premium, performance e SEO para empresas que exigem excelência.",
          "url": "https://wesdigitalstudio.com",
          "priceRange": "$$$",
          "areaServed": {
            "@type": "Country",
            "name": "Brasil"
          },
          "serviceType": [
            "Criação de Sites Institucionais",
            "Criação de Landing Pages",
            "Web Design Profissional",
            "Otimização SEO"
          ],
          "knowsAbout": [
            "Web Design",
            "Desenvolvimento Web",
            "UI/UX Design",
            "SEO",
            "Landing Pages",
            "Sites Institucionais",
            "React",
            "Performance Web"
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Quanto tempo leva para criar um site institucional profissional?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "O prazo médio para um site institucional completo é de 14 a 21 dias, dependendo da complexidade, quantidade de páginas e agilidade no envio de materiais. Landing pages estratégicas são entregues em 7 a 14 dias."
              }
            },
            {
              "@type": "Question",
              "name": "O site funciona bem no celular e em todos os dispositivos?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sim, 100%. Todos os projetos são desenvolvidos com a abordagem Mobile-First, garantindo carregamento rápido e design perfeito em smartphones, tablets e desktops de qualquer tamanho."
              }
            },
            {
              "@type": "Question",
              "name": "Vocês criam landing pages para campanhas de tráfego pago (Google Ads, Meta Ads)?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sim. Nossas landing pages são projetadas especificamente para maximizar conversões em campanhas de tráfego pago, com design focado em ação, carregamento ultra-rápido e código otimizado para SEO e quality score."
              }
            },
            {
              "@type": "Question",
              "name": "O que está incluído em um projeto de site institucional?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Todos os projetos incluem: design personalizado (não usamos templates), desenvolvimento responsivo, otimização de performance, SEO técnico, integração com WhatsApp, e suporte pós-launch. O código é 100% proprietário e entregue ao cliente."
              }
            },
            {
              "@type": "Question",
              "name": "Como funciona o processo de criação do meu site?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "O processo começa com um briefing detalhado para entender seus objetivos. Em seguida, criamos o design personalizado para aprovação, desenvolvemos o código com tecnologia de ponta, realizamos testes de qualidade e entregamos o projeto publicado e otimizado."
              }
            }
          ]
        }
      ]
    }
  </script>
